# ========================================================

name: "Upload Logs and Reports"
description: "An action to upload logs and reports as artifacts."

inputs:
  reports_path:
    description: "The path to the reports"
    required: true
    type: string
    default: "reports/*"
  logs_path:
    description: "The path to the logs"
    required: true
    type: string
    default: "logs/*"

runs:
  using: "composite"
  steps:
    - name: Upload Reports
      if: always() # Always upload reports
      uses: actions/upload-artifact@v4
      with:
        name: reports
        path: ${{ inputs.reports_path }}

    - name: Upload Logs
      if: always() # Always upload logs
      uses: actions/upload-artifact@v4
      with:
        name: logs
        path: ${{ inputs.logs_path }}
# --------------------------------------------------------
# End of .github/actions/upload-logs-and-reports/action.yml
# --------------------------------------------------------
