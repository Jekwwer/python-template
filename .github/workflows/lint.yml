# ========================================================
# .github/workflows/lint.yml
# ========================================================
# Project Name: Python Template Repository
# Description: This workflow performs linting.
#
# Usage: This workflow is triggered by other workflows
#        to perform linting.
#
# Repository: https://github.com/jekwwer/python-template
# Author: Evgenii Shiliaev
# Author's GitHub Username: @Jekwwer
#
# Date: 2024-08-06
# ========================================================

name: Linting

# Trigger the workflow on call from another workflow
on: workflow_call

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lint Code using Makefile
        run: make lint
# ========================================================
# End of .github/workflows/lint.yml
# ========================================================
