# ========================================================
# .github/workflows/lint.yml
# ========================================================
# Project Name: Python Template Repository
# Description: This workflow performs linting on push and
#              pull request events.
#
# Usage: Push or pull request to trigger the linting workflow.
#
# Repository: https://github.com/jekwwer/python-template
# Author: Evgenii Shiliaev
# Author's GitHub Username: jekwwer
#
# Date: 2024-08-06
# ========================================================

name: Linting Workflow

# Trigger the workflow on push or pull request events
on: [push, pull_request]

jobs:
  setup-environment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set Up Python Environment
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"  # TODO: Set your python version

      - name: Cache Pip Dependencies
        uses: actions/cache@v2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

  install-dependencies:
    runs-on: ubuntu-latest
    needs: setup-environment

    steps:
      # Install dependencies using Makefile
      - name: Install Dependencies
        run: make install-dev

  lint-code:
    runs-on: ubuntu-latest
    needs: install-dependencies

    steps:
      # Perform linting using Makefile
      - name: Lint Code
        run: make lint
# ========================================================
# End of .github/workflows/lint.yml
# ========================================================
