# ========================================================
# .github/workflows/type-check.yml
# ========================================================
# Project Name: Python Template Repository
# Description: This workflow performs type checking on push
#              and pull request events.
#
# Usage: Push or pull request to trigger the type check workflow.
#
# Repository: https://github.com/jekwwer/python-template
# Author: Evgenii Shiliaev
# Author's GitHub Username: jekwwer
#
# Date: 2024-08-06
# ========================================================

name: Type Check Workflow

# Trigger the workflow on push or pull request events
on: [push, pull_request]

jobs:
  setup-environment:
    name: Setup Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set Up Python Environment
        uses: actions/setup-python@v2
        with:
          python-version: "3.10" # TODO: Set your python version

      - name: Cache Pip Dependencies
        uses: actions/cache@v2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

  install-dependencies:
    runs-on: ubuntu-latest
    needs: setup-environment

    steps:
      # Install dependencies using Makefile
      - name: Install Dependencies
        run: make install-dev

  perform-type-check:
    name: Perform Type Check
    runs-on: ubuntu-latest
    needs: install-dependencies

    steps:
      # Perform type checking using Makefile
      - name: Run Type Check
        run: make type-check
# ========================================================
# End of .github/workflows/type-check.yml
# ========================================================
