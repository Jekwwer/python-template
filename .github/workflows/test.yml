# ========================================================
# .github/workflows/test.yml
# ========================================================
# Project Name: Python Template Repository
# Description: This workflow runs tests on push
#              and pull request events.
#
# Usage: Push or pull request to trigger the test workflow.
#
# Repository: https://github.com/jekwwer/python-template
# Author: Evgenii Shiliaev
# Author's GitHub Username: jekwwer
#
# Date: 2024-08-06
# ========================================================

name: Testing Workflow

# Trigger the workflow on push or pull request events
on: [push, pull_request]

jobs:
  setup-environment:
    name: Setup Environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set Up Python Environment
        uses: actions/setup-python@v2
        with:
          python-version: "3.10" # TODO: Set your python version

      - name: Cache Pip Dependencies
        uses: actions/cache@v2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

  install-dependencies:
    runs-on: ubuntu-latest
    needs: setup-environment

    steps:
      # Install dependencies using Makefile
      - name: Install Dependencies
        run: make install-dev

  format-code:
    name: Format Code
    runs-on: ubuntu-latest
    needs: install-dependencies

    steps:
      # Format code using Makefile
      - name: Format Code
        run: make format

  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: format-code

    steps:
      # Run tests using Makefile
      - name: Run Tests
        run: make test
# ========================================================
# End of .github/workflows/test.yml
# ========================================================
