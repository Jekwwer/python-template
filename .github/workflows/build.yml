# ========================================================
# .github/workflows/build.yml
# ========================================================
# Project Name: Python Template Repository
# Description: This workflow sets up the Python environment,
#              installs dependencies, runs tests,
#              and builds the package on every push.
#
# Usage: Push or pull request to trigger the CI/CD pipeline.
#
# Repository: https://github.com/jekwwer/python-template
# Author: Evgenii Shiliaev
# Author's GitHub Username: jekwwer
#
# Date: 2024-08-06
# ========================================================

name: CI/CD Pipeline

# Trigger the workflow on push or pull request events
on: [push, pull_request]

jobs:
  setup-environment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v2

      - name: Set Up Python Environment
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"  # TODO: Set your python version

      - name: Cache Pip Dependencies
        uses: actions/cache@v2
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'dev-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

  install-dependencies:
    runs-on: ubuntu-latest
    needs: setup-environment

    steps:
      # Install dependencies using Makefile
      - name: Install Dependencies
        run: make install-dev

  run-tests:
    runs-on: ubuntu-latest
    needs: install-dependencies

    steps:
      # Run tests using Makefile
      - name: Run Tests
        run: make test

  build-package:
    runs-on: ubuntu-latest
    needs: run-tests

    steps:
      # Create a package using Makefile
      - name: Build Package
        run: make package
# ========================================================
# End of .github/workflows/build.yml
# ========================================================
